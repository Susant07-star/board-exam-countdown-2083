<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 12 Board Exam 2083 Countdown</title>
    <meta name="description" content="Live countdown to Nepal Class 12 Board Exams 2083. Let's do this! 💪">
    <!-- Favicon: SVG (modern browsers) + data URI fallback (all browsers) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <!-- Inline data URI as universal fallback -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23020614'/%3E%3Ccircle cx='32' cy='32' r='28' fill='none' stroke='%23a855f7' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%2300d4ff' stroke-width='1' stroke-dasharray='4 3'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial Black,Arial,sans-serif' font-weight='900' font-size='24' fill='%2300d4ff'%3E12%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Canvas for particle background -->
    <canvas id="stars-canvas"></canvas>

    <!-- Full screen flicker effect overlay -->
    <div class="flicker-overlay" id="flicker"></div>

    <div class="wrapper">
        <div class="top-badge">NEB Exams 2083</div>
        
        <h1 class="main-title">Class 12 <span class="year-highlight">Board Exam</span><br>Countdown</h1>
        
        <div class="subtitle-wrap">
            <h2 class="subtitle" id="rotating-text">Final battle begins...</h2>
        </div>

        <div class="countdown-grid" id="countdown-container">
            <div class="time-block days">
                <span class="time-num" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-block hours">
                <span class="time-num" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-block minutes">
                <span class="time-num" id="minutes">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="time-block seconds">
                <span class="time-num" id="seconds">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-label">
                <span>Time Elapsed</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        </div>

        <div class="motive-card">
            "Push yourself, because no one else is going to do it for you."<br>
            <strong>Only a few hours left. Make them count.</strong>
        </div>

        <div class="info-row">
            <div class="info-pill">
                <i class="fa-solid fa-calendar icon"></i>
                <span>April 27, 2026</span>
            </div>
            <div class="info-pill">
                <i class="fa-regular fa-clock icon"></i>
                <span>8:00 AM (NPT)</span>
            </div>
        </div>
    </div>

    <footer>
        Made for students • 2083
    </footer>

    <script src="script.js"></script>
</body>
</html>
