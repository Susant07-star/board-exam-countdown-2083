<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b4b"/>
      <stop offset="100%" stop-color="#020614"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Outer glow ring (decorative) -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(168,85,247,0.15)" stroke-width="2"/>

  <!-- Main clock ring - outer -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Clock tick marks -->
  <g fill="none" stroke="rgba(0,212,255,0.5)" stroke-width="3" stroke-linecap="round">
    <!-- 12 tick marks -->
    <line x1="256" y1="68" x2="256" y2="88"/>
    <line x1="356" y1="96" x2="346" y2="113"/>
    <line x1="424" y1="166" x2="407" y2="176"/>
    <line x1="448" y1="256" x2="428" y2="256"/>
    <line x1="424" y1="346" x2="407" y2="336"/>
    <line x1="356" y1="416" x2="346" y2="399"/>
    <line x1="256" y1="444" x2="256" y2="424"/>
    <line x1="156" y1="416" x2="166" y2="399"/>
    <line x1="88"  y1="346" x2="105" y2="336"/>
    <line x1="64"  y1="256" x2="84"  y2="256"/>
    <line x1="88"  y1="166" x2="105" y2="176"/>
    <line x1="156" y1="96"  x2="166" y2="113"/>
  </g>

  <!-- Grad cap icon at top -->
  <g transform="translate(256, 130)" filter="url(#softGlow)">
    <!-- Cap board -->
    <polygon points="-38,0 0,-22 38,0 0,22" fill="rgba(168,85,247,0.9)" stroke="rgba(0,212,255,0.6)" stroke-width="2"/>
    <!-- Cap top -->
    <rect x="-16" y="-38" width="32" height="24" rx="3" fill="rgba(0,212,255,0.8)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Tassel -->
    <line x1="38" y1="0" x2="38" y2="22" stroke="rgba(0,212,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="38" cy="24" r="3" fill="rgba(0,212,255,0.9)"/>
  </g>

  <!-- "C12" main text -->
  <text
    x="256"
    y="278"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="110"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="-4"
  >C12</text>

  <!-- "2083" subtitle text -->
  <text
    x="256"
    y="340"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-weight="400"
    font-size="30"
    fill="rgba(148,163,184,0.8)"
    letter-spacing="10"
  >2083</text>

  <!-- Inner decorative arc (bottom, partial) -->
  <path d="M 100 320 A 165 165 0 0 0 412 320" fill="none" stroke="rgba(168,85,247,0.2)" stroke-width="1.5"/>

</svg>
